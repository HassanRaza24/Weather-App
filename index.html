<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input id="user-info" type="text" placeholder="Enter City Name" spellcheck="false">
            <button id="btn"><img src="/weather-app/search.png" alt="Search Icon"></button>
        </div>
        <div class="error">
            <p>Invalid name</p>
        </div>
        <div class="weather">
            <img src="/weather-app/rain.png" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city" >New York</h2>
            <div class="details">
                <div class="col">
                    <img src="/weather-app/humidity.png" alt="Humidity icon">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="/weather-app/wind.png" alt="Wind icon">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
